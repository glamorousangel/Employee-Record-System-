<div class="card border-0 shadow-sm">
  <div class="card-header bg-white d-flex justify-content-between align-items-center py-2">
    <h6 class="mb-0 fw-bold">Notifications</h6>
    <button class="btn btn-sm btn-link text-decoration-none p-0" id="markAllReadBtn">
      Mark All as Read
    </button>
  </div>
  <div class="list-group list-group-flush" id="notification-list" style="max-height: 400px; overflow-y: auto;">
    {% for notif in global_recent_notifications %}
      <div class="list-group-item list-group-item-action py-3 {% if not notif.is_read %}bg-light{% endif %}" id="notif-{{ notif.id }}">
        <div class="d-flex w-100 justify-content-between align-items-start">
          <div>
            <span class="badge bg-secondary mb-1">{{ notif.notification_type }}</span>
            <p class="mb-1 small">{{ notif.message }}</p>
            <small class="text-muted">{{ notif.created_at|date:"M d, Y H:i" }}</small>
          </div>
          {% if not notif.is_read %}
            <button class="btn btn-sm btn-outline-primary ms-2 rounded-circle border-0 mark-read-btn" 
                    data-id="{{ notif.id }}" 
                    title="Mark as read">
              <i class="bi bi-circle-fill" style="font-size: 0.5rem;"></i>
            </button>
          {% endif %}
        </div>
      </div>
    {% empty %}
      <div class="list-group-item text-center py-4 text-muted">
        <small>No recent notifications</small>
      </div>
    {% endfor %}
  </div>
  <div class="card-footer bg-white text-center py-2 border-top-0">
    <a href="{% url 'notifications:notification_list' %}" class="text-decoration-none small fw-bold">View All Notifications</a>
  </div>
</div>

<script>
  // Helper to get CSRF Token safely
  function getCSRFToken() {
    var csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
    if (csrfInput) {
      return csrfInput.value;
    }
    var cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      var cookies = document.cookie.split(';');
      for (var i = 0; i < cookies.length; i++) {
        var cookie = cookies[i].trim();
        if (cookie.substring(0, 'csrftoken'.length + 1) === ('csrftoken' + '=')) {
          cookieValue = decodeURIComponent(cookie.substring('csrftoken'.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }

  // Use an event listener instead of 'onclick' in the HTML to fix IDE errors
  document.addEventListener('click', function(event) {
    if (event.target.closest('.mark-read-btn')) {
      var btn = event.target.closest('.mark-read-btn');
      var id = btn.getAttribute('data-id');
      markAsRead(id, btn);
    } else if (event.target.closest('#markAllReadBtn')) {
      markAllAsRead();
    }
  });

  function updateBadge(newCount) {
    var badge = document.getElementById('notification-badge');
    if (badge) {
      if (newCount > 0) {
        badge.textContent = newCount;
        badge.classList.remove('d-none');
      } else {
        badge.textContent = '0';
        badge.classList.add('d-none');
      }
    }
  }

  function markAsRead(id, btnElement) {
    fetch('/notifications/mark-read/' + id + '/', {
      method: 'POST',
      headers: {
        'X-CSRFToken': getCSRFToken(),
        'Content-Type': 'application/json'
      },
      // Added a body to avoid '400 Bad Request' on some Django setups
      body: JSON.stringify({ id: id })
    })
    .then(function(response) { return response.json(); })
    .then(function(data) {
      if (data.status === 'success') {
        var notifItem = document.getElementById('notif-' + id);
        if (notifItem) {
          notifItem.classList.remove('bg-light');
          if (btnElement) btnElement.remove();
        }
        
        fetch('/notifications/unread-count/')
          .then(function(res) { return res.json(); })
          .then(function(countData) {
            updateBadge(countData.count);
          });
      }
    })
    .catch(function(error) { console.error('Error:', error); });
  }

  function markAllAsRead() {
    fetch('/notifications/mark-all-read/', {
      method: 'POST',
      headers: {
        'X-CSRFToken': getCSRFToken(),
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({})
    })
    .then(function(response) { return response.json(); })
    .then(function(data) {
      if (data.status === 'success') {
        var items = document.querySelectorAll('#notification-list .bg-light');
        items.forEach(function(item) {
          item.classList.remove('bg-light');
          var btn = item.querySelector('.mark-read-btn');
          if (btn) btn.remove();
        });
        updateBadge(0);
      }
    })
    .catch(function(error) { console.error('Error:', error); });
  }
</script>

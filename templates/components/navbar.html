<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">ERS-HCI</a>
    
    <!-- Inspirational Quote -->
    <div class="mx-auto d-none d-md-block text-muted text-center" style="font-style: italic; font-size: 0.9rem; max-width: 50%;">
        "{{ global_quote }}"
    </div>

    <div class="d-flex align-items-center gap-3">
      <!-- User Role -->
      {% if global_user_role %}
      <span class="badge rounded-pill" style="background-color: #800000; color: white;">
          {{ global_user_role }}
      </span>
      {% endif %}

      <div class="dropdown">
        <a class="nav-link dropdown-toggle position-relative" href="#" role="button" id="notificationDropdown" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="fas fa-bell"></i> {% if global_unread_count > 0 %}
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notification-badge" style="font-size: 0.6rem;">
              {{ global_unread_count }}
              <span class="visually-hidden">unread messages</span>
            </span>
          {% else %}
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" id="notification-badge" style="font-size: 0.6rem;">
              0
              <span class="visually-hidden">unread messages</span>
            </span>
          {% endif %}
        </a>
        <div class="dropdown-menu dropdown-menu-end p-0" aria-labelledby="notificationDropdown" style="width: 350px;">
          {% include 'components/notification_list.html' %}
        </div>
      </div>
    </div>
  </div>
</nav>

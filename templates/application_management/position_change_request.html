<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Position Change Request | Employee System</title>
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link rel="stylesheet" href="../../static/css/application_management/position_change_request.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="background"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="top-section">
            <div class="logo-wrapper" id="logoToggle">
                <img src="../../static/img/general/uph.png" class="logo">
                <div class="open-icon"><i class="fas fa-chevron-right"></i></div>
            </div>
            <button class="close-btn" id="closeBtn"><i class="fas fa-chevron-left"></i></button>
        </div>

        <ul class="menu">
            <li><a href="../dashboards/emp_dash.html" class="menu-item"><i class="fas fa-border-all"></i> <span>Dashboard</span></a></li>
            <li><a href="../accounts/emp_profile_view.html" class="menu-item"><i class="fas fa-user"></i> <span>Profile</span></a></li>
            <hr>
            <li><a href="#" class="menu-item"><i class="fas fa-user-edit"></i><span>Position Change Request</span></a></li>
            <li><a href="#" class="menu-item"><i class="fas fa-calendar-check"></i><span>Attendance</span></a></li>
            <li><a href="#" class="menu-item active"><i class="fas fa-plane-departure"></i><span>Leave Request</span></a></li>
            <li><a href="#" class="menu-item"><i class="fas fa-star"></i><span>Performance Evaluation</span></a></li>
            <li><a href="#" class="menu-item"><i class="fas fa-chalkboard-teacher"></i><span>Trainings</span></a></li>
        </ul>

        <div class="bottom-section">
            <a href="../login/login.html" class="menu-item logout"><i class="fas fa-sign-out-alt"></i> <span>Log Out</span></a>
        </div>
    </div>

    <div class="dashboard-viewport">
        <main class="main-content">
            <div class="form-card">
                <h2>Position Change Request</h2>
                
                <form class="position-form" id="positionForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="empName">EMPLOYEE NAME</label>
                            <input type="text" id="empName" placeholder="e.g. Dela Cruz, Juan" required>
                        </div>
                        <div class="form-group">
                            <label for="empId">EMPLOYEE ID</label>
                            <input type="text" id="empId" placeholder="Auto-filled" disabled>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="currentPos">CURRENT POSITION</label>
                            <input type="text" id="currentPos" placeholder="Auto-filled" disabled>
                        </div>
                        <div class="form-group">
                            <label for="currentDept">DEPARTMENT</label>
                            <input type="text" id="currentDept" placeholder="Auto-filled" disabled>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="requestedPos">REQUESTED POSITION</label>
                            <select id="requestedPos" required>
                                <option value="">Select position...</option>
                                <option>Dean</option>
                                <option>Department Head</option>
                                <option>Senior Instructor</option>
                                <option>Instructor</option>
                                <option>Professor</option>
                                <option>Assistant Professor</option>
                                <option>Registrar</option>
                                <option>Clinical Instructor</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="effectiveDate">EFFECTIVE DATE</label>
                            <input type="date" id="effectiveDate" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="reason">REASON</label>
                            <textarea id="reason" placeholder="Input reason for position change..." rows="6" required></textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
                        <button type="button" class="btn-save" id="submitBtn">Save</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <div id="viewModal" class="modal-overlay">
        <!-- Modal not used for position change requests -->
    </div>

    <template id="leaveRowTemplate">
        <!-- Template not used for position change requests -->
    </template>

    <script src="../../static/js/application_management/position_change_request.js"></script>
</body>
</html>

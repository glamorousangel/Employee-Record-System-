{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>    
    <img src="{% static 'img/general/uph.png' %}" class="logo">
    <link rel="stylesheet" href="{% static 'css/admin/admin_dash.css' %}">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <div class="sidebar" id="sidebar">

        <div class="top-section">
            <div class="logo-wrapper" id="logoToggle">
                <img src="{% static 'img/general/uph.png' %}" class="logo">
                <div class="open-icon">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>

            <button class="close-btn" id="closeBtn">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>

        <ul class="menu">

            <li>
                <a href="{% url 'admin_dashboard' %}" class="menu-item active">
                    <i class="fas fa-border-all"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <hr>

            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-users-cog"></i>
                    <span>User & Roles</span>
                </a>
            </li>

            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-sliders-h"></i>
                    <span>System Configuration</span>
                </a>
            </li>

            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-shield-alt"></i>
                    <span>Security & Privacy</span>
                </a>
            </li>

            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-database"></i>
                    <span>Data Management</span>
                </a>
            </li>

        </ul>

        <div class="bottom-section">
            <a href="{% url 'login' %}" class="menu-item logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Log Out</span>
            </a>
        </div>

    </div>

    <script src="{% static 'js/dashboard/admin_dash.js' %}"></script>
</body>
</html>

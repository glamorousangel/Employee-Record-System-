{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Settings | Employee Portal</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'img/general/uph.png' %}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/application/application_info.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin/admin.css' %}">

    <style>
        /* --- 1. THE GLASSMORPHISM ENGINE (Layout & Sidebar) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body { height: 100vh; background: transparent; }

        .background {
            position: fixed; inset: 0;
            background: url('{% static "img/general/bg.jpeg" %}') no-repeat center/cover;
            filter: blur(10px); transform: scale(1.1); z-index: -1;
        }

        .dashboard-viewport { display: flex; height: 100vh; width: 100vw; padding: 20px; box-sizing: border-box; gap: 20px; }

        .sidebar {
            position: fixed; top: 20px; left: 20px; height: calc(100% - 40px); width: 300px; padding: 25px;
            border-radius: 20px; display: flex; flex-direction: column; justify-content: space-between;
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15); transition: width 0.35s ease-in-out; z-index: 1000;
        }
        .sidebar.collapsed { width: 90px; }

        .main-content { flex: 1; display: flex; height: 100%; margin-left: 320px; transition: margin-left 0.35s ease-in-out; min-width: 0;}
        .sidebar.collapsed ~ .dashboard-viewport .main-content { margin-left: 110px; }

        .leave-card {
            background: #ffffff; border-radius: 25px; padding: 25px 32px; width: 100%;
            display: flex; flex-direction: column; height: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.1); box-sizing: border-box; flex: 1; min-width: 0;
        }

        /* Sidebar Menu Styles */
        .menu { list-style: none; margin-top: 30px; flex: 1; }
        .menu-item { display: flex; align-items: center; height: 48px; color: white; text-decoration: none; border-radius: 12px; transition: background 0.3s; margin-bottom: 5px; cursor: pointer;}
        .menu-item i { width: 50px; text-align: center; }
        .menu-item:hover { background: rgba(255,255,255,0.15); }
        .menu-item.active { background: rgba(255,255,255,0.25); }
        .sidebar.collapsed .menu-item span { display: none; }
        .logo-wrapper { cursor: pointer; display: flex; align-items: center; justify-content: center; width: 45px; height: 45px;}

        /* --- 2. SECURITY SETTINGS SPECIFIC CSS --- */
        .settings-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 60px; /* Pushes the card down a bit from the top */
        }

        .settings-card {
            background: #ffffff;
            border: 1px solid #f0f0f0;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px; /* Keeps it perfectly sized like your image */
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        .settings-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 35px;
        }

        .settings-icon {
            background: #800000;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(128,0,0,0.2);
        }

        .settings-title h2 {
            margin: 0;
            color: #1a1a1a;
            font-size: 22px;
            font-weight: 700;
        }

        .settings-title p {
            margin: 5px 0 0 0;
            color: #6c757d;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            color: #333;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: #800000;
        }

        .help-text {
            display: block;
            margin-top: 8px;
            font-size: 11px;
            color: #888;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #a02d2d, #800000); /* Matches your button gradient */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.1s;
        }

        .btn-submit:hover {
            opacity: 0.95;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        @media (max-width: 768px) {
            .dashboard-viewport { padding: 12px; gap: 12px; }
            .main-content { margin-left: 0; }
            .leave-card { padding: 20px; border-radius: 18px; }
            .settings-card { padding: 25px; box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="dashboard-viewport">
        <nav class="sidebar" id="sidebar">
            <div class="top-section">
                <div class="logo-wrapper" onclick="toggleSidebar()">
                    <img src="{% static 'img/general/uph.png' %}" style="width: 45px; border-radius: 50%;">
                </div>
            </div>
            <ul class="menu">
                <li><a href="{% url 'user_management' %}" class="menu-item"><i class="fas fa-users-cog"></i><span>User Management</span></a></li>
                <li><a href="{% url 'employee_list' %}" class="menu-item"><i class="fas fa-address-card"></i><span>Employee Records</span></a></li>
                <li><a href="{% url 'department_management' %}" class="menu-item"><i class="fas fa-sitemap"></i><span>Department Management</span></a></li>
                <li><a href="{% url 'audit_trails' %}" class="menu-item"><i class="fas fa-history"></i><span>Audit Trails</span></a></li>
                
                <li><a href="{% url 'security_settings' %}" class="menu-item active"><i class="fas fa-shield-alt"></i><span>Security Settings</span></a></li>
            </ul>
            <div class="bottom-section">
                <hr style="border: 0.5px solid rgba(255,255,255,0.2); margin: 10px 0;">
                <a href="{% url 'logout' %}" class="menu-item"><i class="fas fa-sign-out-alt"></i><span>Log Out</span></a>
            </div>
        </nav>

        <main class="main-content">
            <div class="leave-card">
                
                <div class="settings-container">
                    <div class="settings-card">
                        
                        <div class="settings-header">
                            <div class="settings-icon">
                                <i class="fas fa-shield-alt"></i>
                            </div>
                            <div class="settings-title">
                                <h2>Security Settings</h2>
                                <p>Manage session and authentication protocols</p>
                            </div>
                        </div>

                        <form method="POST" action="{% url 'security_settings' %}">
                            {% csrf_token %}
                            
                            <div class="form-group">
                                <label>Session Timeout Duration (Minutes)</label>
                                <input type="number" name="session_timeout" class="form-control" value="{{ current_timeout|default:'30' }}" min="1" required>
                                <span class="help-text">Recommended: 30-60 minutes for production.</span>
                            </div>

                            <button type="submit" class="btn-submit">
                                Update Security Policies
                            </button>

                        </form>

                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="{% static 'js/admin/sidebar.js' %}"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }
    </script>
</body>
</html>
